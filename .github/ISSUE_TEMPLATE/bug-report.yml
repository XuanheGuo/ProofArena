name: Bug 报告
description: 报告页面、交互、构建或内容显示问题
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 实际发生了什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开...
        2. 点击...
        3. 观察到...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境
      placeholder: 例如：macOS 15 / Chrome 136 / 390px 宽度
  - type: textarea
    id: extra
    attributes:
      label: 截图或补充信息
